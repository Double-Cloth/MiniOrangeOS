name: Linux CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: miniorangeos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CI_ARTIFACT_DIR: ${{ runner.temp }}/miniorangeos-ci-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build pinned development image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CI_ARTIFACT_DIR"
          docker build \
            --file environment/Containerfile \
            --tag miniorangeos-ci:${{ github.sha }} \
            . 2>&1 | tee "$CI_ARTIFACT_DIR/container-build.log"

      - name: Verify environment and run complete suite
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --name "miniorangeos-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --volume "$GITHUB_WORKSPACE:/source:ro" \
            --volume "$CI_ARTIFACT_DIR:/artifacts" \
            "miniorangeos-ci:${GITHUB_SHA}" \
            bash /source/environment/ubuntu/ci-run.sh

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-ci-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/miniorangeos-ci-artifacts/
          if-no-files-found: error
          retention-days: 14
